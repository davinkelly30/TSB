
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catalog | Total Services Bahamas</title>
<style>
body { margin:0; font-family:Arial,sans-serif; background:#f5f7fa; color:#0b1f3b; }
.header { display:flex; justify-content:space-between; align-items:center; padding:16px 40px; background:white; box-shadow:0 2px 10px rgba(0,0,0,.08); }
.brand { font-weight:800; font-size:20px; }
.nav a { margin-left:18px; text-decoration:none; color:#0b1f3b; font-weight:600; }
.hero { padding:75px 40px; background:#0b1f3b; color:white; text-align:center; }
.container { max-width:1100px; margin:40px auto; padding:30px; }
.search { width:100%; padding:14px; border:1px solid #ccc; border-radius:8px; font-size:16px; margin-bottom:24px; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:22px; }
.card { background:white; padding:24px; border-radius:14px; box-shadow:0 4px 16px rgba(0,0,0,.08); }
.card h3 { margin-top:0; }
.category { font-weight:800; color:#163a5f; margin-bottom:10px; }
.empty { background:white; padding:25px; border-radius:12px; }
@media(max-width:850px){ .grid{grid-template-columns:1fr;} .header{flex-direction:column;gap:14px;} }
</style>
</head>

<body>

<div class="header">
  <div class="brand">TOTAL SERVICES</div>
  <div class="nav">
    <a href="/">Home</a>
    <a href="/parts.html">Parts</a>
    <a href="/services.html">Services</a>
    <a href="/catalog.html">Catalog</a>
    <a href="/rfq.html">RFQ</a>
  </div>
</div>

<div class="hero">
  <h1>Parts & Systems Catalog</h1>
  <p>Browse available parts, components, generator support items, and electrical equipment.</p>
</div>

<div class="container">
  <input class="search" id="search" placeholder="Search products by name, category, or description..." oninput="renderProducts()" />

  <div id="catalogGrid" class="grid"></div>
</div>

<script>
let products = [];

async function loadProducts(){
  const grid = document.getElementById("catalogGrid");

  try {
    const res = await fetch("/products");
    products = await res.json();

    renderProducts();

  } catch (err) {
    grid.innerHTML = `<div class="empty">Failed to load catalog.</div>`;
    console.error(err);
  }
}

function renderProducts(){
  const grid = document.getElementById("catalogGrid");
  const search = document.getElementById("search").value.toLowerCase();

  const filtered = products.filter(p =>
    (p.name || "").toLowerCase().includes(search) ||
    (p.category || "").toLowerCase().includes(search) ||
    (p.description || "").toLowerCase().includes(search)
  );

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty">No matching products found.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="card">
      <h3>${p.name || "Unnamed Product"}</h3>
      <div class="category">${p.category || "General"}</div>
      <p>${p.description || "No description available."}</p>
      <a href="/rfq.html">Request Quote</a>
    </div>
  `).join("");
}

loadProducts();
</script>

</body>
</html>
